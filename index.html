<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mahindra Singh</title>

<style>

body, html, #app{
  margin:0;
  width:100%;
  height:100%;
}

body{
  touch-action:none;
  font-family: "Montserrat", sans-serif;
  background:black;
}

#app{
  height:100%;
}

#canvas{
  position:fixed;
  top:0;
  right:0;
  bottom:0;
  left:0;
}

.hero{
  position:relative;
  height:100%;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:15px;
}

h1,h2{
  margin:0;
  color:white;
  text-shadow:0 0 20px rgba(0,0,0,1);
  user-select:none;
}

h1{
  font-size:80px;
  font-weight:700;
  text-transform:uppercase;
}

h2{
  font-size:60px;
  font-weight:500;
  text-transform:uppercase;
}

.hero a{
  padding:12px 35px;
  background:white;
  color:black;
  border-radius:40px;
  font-weight:600;
  text-decoration:none;
  transition:0.3s;
}

.hero a:hover{
  transform:scale(1.1);
}

</style>

</head>

<body>

<div id="app">

<canvas id="canvas"></canvas>

<div class="hero">
<h1>Mahindra</h1>
<h2>Singh</h2>

<a target="_blank"
href="https://mahi-8755652540.github.io/My-portfolio/">
Visit My Portfolio
</a>

</div>

</div>

<script type="module">

import TubesCursor from "https://cdn.jsdelivr.net/npm/threejs-components@0.0.19/build/cursors/tubes1.min.js"

const app = TubesCursor(document.getElementById('canvas'), {

  tubes:{
    colors:["#f967fb","#53bc28","#6958d5"],

    lights:{
      intensity:200,
      colors:["#83f36e","#fe8a2e","#ff008a","#60aed5"]
    }

  }

})

document.body.addEventListener('click',()=>{

const colors=randomColors(3)
const lightsColors=randomColors(4)

app.tubes.setColors(colors)
app.tubes.setLightsColors(lightsColors)

})

function randomColors(count){

return new Array(count)
.fill(0)
.map(()=>
"#"+Math.floor(Math.random()*16777215)
.toString(16)
.padStart(6,'0')
)

}

</script>

</body>
</html>
